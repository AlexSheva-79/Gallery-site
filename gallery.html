<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VOID.ARCHIVE — Галерея</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="gallery-page.css">
</head>
<body class="gallery-page-body">

<div class="grain"></div>

<!-- top bar -->
<header class="exhibit-bar">
  <a href="index.html" class="exhibit-bar__logo">V.A</a>
  <span class="exhibit-bar__count" id="galleryCount">— works in the archive</span>
  <button class="lang-switch lang-switch--exhibit" id="langSwitch" aria-label="Switch language">
    <span class="lang-switch__opt active" data-lang="ru">RU</span>
    <span class="lang-switch__sep">/</span>
    <span class="lang-switch__opt" data-lang="en">EN</span>
  </button>
</header>

<!-- exhibit intro -->
<section class="exhibit-intro">
  <p class="exhibit-intro__eyebrow">// АРХИВ 001 — ПОЛНАЯ КОЛЛЕКЦИЯ</p>
  <h1 class="exhibit-intro__title" data-i18n="gallery.title">Галерея</h1>
  <p class="exhibit-intro__desc" data-i18n="gallery.desc">Каждая работа — кадр из истории, которая не закончилась. Нажми на работу, чтобы открыть в полном размере.</p>
</section>

<!-- full gallery -->
<section class="exhibit-grid-wrap">
  <div class="exhibit-grid" id="galleryGrid">
    <!-- generated by JS -->
  </div>
</section>

<footer class="exhibit-footer">
  <a href="index.html" class="exhibit-footer__back">
    <span class="exhibit-footer__arrow">←</span>
    <span data-i18n="gallery.back">На главную</span>
  </a>
  <span class="exhibit-footer__copy">© 2026 VOID.ARCHIVE</span>
</footer>

<script src="data.js"></script>
<script src="lightbox.js"></script>
<script src="gallery.js"></script>
</body>
</html>
